server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Forward /api/* calls to the API service (the compose service name).
    # The trailing slash in proxy_pass strips the /api prefix:
    #   /api/health  ->  http://api:8000/health
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Needed for streaming (SSE) in M5.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA: any route falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
